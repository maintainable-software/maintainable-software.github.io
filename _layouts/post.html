---
layout: default
---

<article class="content-shell post-shell post h-entry" itemscope itemtype="http://schema.org/BlogPosting">
  <header class="content-header post-header">
    <h1 class="post-title p-name" itemprop="name headline">{{ page.title | escape }}</h1>
    <p class="post-meta">
      <time class="dt-published" datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished">
        {{ page.date | date: "%-d %b, %Y" }}
      </time>
      <span>{{ content | number_of_words | divided_by: 180 | plus: 1 }} min read</span>
    </p>

    {% if page.tags %}
      <p class="post-tags">
        {% for tag in page.tags %}
          <a href="{{ '/tags/#' | append: (tag | slugify) | relative_url }}">{{ tag }}</a>
        {% endfor %}
      </p>
    {% endif %}
  </header>

  <div class="content-body post-content e-content" itemprop="articleBody">
    {{ content }}
  </div>
</article>
