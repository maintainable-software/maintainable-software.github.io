<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f7f0de">
    <title>{% if page.title and page.layout != 'home' %}{{ page.title | escape }} | {% endif %}{{ site.title | escape }}</title>
    <meta name="description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace | escape }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="alternate" type="application/atom+xml" title="{{ site.title | escape }}" href="{{ '/feed.xml' | relative_url }}">
    {%- feed_meta -%}
  </head>
  <body class="site-shell page-{{ page.layout | default: 'default' }}">
    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-brand" href="{{ '/' | relative_url }}">
          <strong>{{ site.title }}</strong>
        </a>

        <nav class="site-nav" aria-label="Main navigation">
          <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}aria-current="page"{% endif %}>Posts</a>
          {% for path in site.header_pages %}
            {% assign nav_page = site.pages | where: "path", path | first %}
            {% if nav_page and nav_page.title != 'Tags' %}
              <a href="{{ nav_page.url | relative_url }}" {% if page.url == nav_page.url %}aria-current="page"{% endif %}>{{ nav_page.title | escape }}</a>
            {% endif %}
          {% endfor %}
        </nav>
      </div>
    </header>

    <main class="site-main">
      {{ content }}
    </main>

    <footer class="site-footer">
    </footer>
  </body>
</html>
